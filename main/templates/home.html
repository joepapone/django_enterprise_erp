{% extends 'base.html' %}
    {% block content %}
    {% load static %}
    <div class="col-10 col-s-10">
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert {% if message.tags %}alert-{{ message.tags }}"{% endif %}>
                <span class="closebtn" onclick="this.parentElement.style.display='none';">&times;</span>{{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}
        <div class="sheet-container">
            <div class="sheet-row">
                <div class="sheet-data-col">
                    <div class="sheet-data-text">{{ message }}</div>
                </div>
            </div>
            <div class="sheet-row">
                <div class="sheet-image-col">
                    <div class="sheet-image">
                        <img src="{% static 'img/erp.png' %}" width="401" height="336">
                    </div>
                </div>
            </div>
        </div>
    </div>
    {% endblock %}
